<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Theo dõi truyền hoá chất</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: Inter, system-ui, sans-serif; }
    .glass { backdrop-filter: blur(14px); background: rgba(255,255,255,0.75); }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-100 via-cyan-50 to-blue-100 text-slate-800">
  <div class="max-w-6xl mx-auto p-4 md:p-8">
    <header class="glass rounded-3xl shadow-xl p-6 mb-6 border border-white/40">
      <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
        <div>
          <h1 class="text-3xl font-bold">💉 Theo dõi truyền hoá chất</h1>
          <p class="text-slate-600 mt-1">Bảng điều khiển theo dõi quá trình điều trị cho bệnh nhân ung thư</p>
        </div>
        <div class="text-sm bg-white rounded-2xl px-4 py-3 shadow">
          <div>Chu kỳ hiện tại: <span class="font-semibold" id="cycle">3/6</span></div>
          <div>Tiến độ: <span class="font-semibold" id="progressText">50%</span></div>
        </div>
      </div>
    </header>

    <div class="grid md:grid-cols-3 gap-6">
      <section class="md:col-span-2 glass rounded-3xl p-6 shadow-xl">
        <h2 class="text-xl font-semibold mb-4">Thông tin truyền hôm nay</h2>
        <div class="grid sm:grid-cols-2 gap-4">
          <div class="bg-white rounded-2xl p-4 shadow">
            <label class="text-sm text-slate-500">Tên thuốc</label>
            <input id="drug" class="w-full mt-1 p-3 rounded-xl border" value="Paclitaxel" />
          </div>
          <div class="bg-white rounded-2xl p-4 shadow">
            <label class="text-sm text-slate-500">Liều lượng (mg)</label>
            <input id="dose" type="number" class="w-full mt-1 p-3 rounded-xl border" value="175" />
          </div>
          <div class="bg-white rounded-2xl p-4 shadow">
            <label class="text-sm text-slate-500">Tốc độ truyền (ml/h)</label>
            <input id="rate" type="range" min="10" max="200" value="80" class="w-full" oninput="updateRate(this.value)" />
            <div class="mt-2 font-semibold"><span id="rateValue">80</span> ml/h</div>
          </div>
          <div class="bg-white rounded-2xl p-4 shadow">
            <label class="text-sm text-slate-500">Tình trạng bệnh nhân</label>
            <select class="w-full mt-1 p-3 rounded-xl border">
              <option>Ổn định</option>
              <option>Mệt nhẹ</option>
              <option>Buồn nôn</option>
              <option>Cần theo dõi sát</option>
            </select>
          </div>
        </div>
      </section>

      <section class="glass rounded-3xl p-6 shadow-xl">
        <h2 class="text-xl font-semibold mb-4">Tiến độ truyền</h2>
        <div class="w-full bg-slate-200 rounded-full h-6 overflow-hidden">
          <div id="progressBar" class="bg-cyan-500 h-6 rounded-full transition-all" style="width:50%"></div>
        </div>
        <button onclick="advanceProgress()" class="mt-4 w-full bg-cyan-600 text-white py-3 rounded-2xl hover:bg-cyan-700 transition">Cập nhật tiến độ</button>
        <div class="mt-6 text-sm text-slate-600 space-y-2">
          <p>⏱ Bắt đầu: 08:30</p>
          <p>🏁 Dự kiến kết thúc: 12:45</p>
          <p>👩‍⚕️ Điều dưỡng phụ trách: Nguyễn A</p>
        </div>
      </section>
    </div>

    <section class="glass rounded-3xl p-6 shadow-xl mt-6">
      <h2 class="text-xl font-semibold mb-4">Ghi chú & tác dụng phụ</h2>
      <textarea class="w-full min-h-32 p-4 rounded-2xl border" placeholder="Nhập ghi chú theo dõi: dấu hiệu sinh tồn, phản ứng thuốc, triệu chứng..."></textarea>
      <button class="mt-4 bg-slate-900 text-white px-6 py-3 rounded-2xl">Lưu hồ sơ</button>
    </section>
  </div>

  <script>
    let progress = 50;
    function updateRate(val) {
      document.getElementById('rateValue').textContent = val;
    }
    function advanceProgress() {
      progress = Math.min(progress + 10, 100);
      document.getElementById('progressBar').style.width = progress + '%';
      document.getElementById('progressText').textContent = progress + '%';
    }
  </script>
</body>
</html>
