<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Không Tìm Thấy Trang | Pro Max</title>
    <style>
        :root {
            --bg-color: #0a0a0c;
            --text-color: #ffffff;
            --accent-color: #0071e3; /* Xanh Apple Pro */
            --sub-text: #86868b;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 20px;
        }

        .code {
            font-size: 15vw;
            font-weight: 700;
            line-height: 1;
            margin: 0;
            background: linear-gradient(90deg, #4da3ff, #ffffff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: fadeIn 1s ease-in-out;
        }

        .message {
            font-size: 24px;
            font-weight: 600;
            margin-top: -10px;
            margin-bottom: 20px;
            color: var(--text-color);
            opacity: 0;
            animation: slideUp 1s ease-out 0.5s forwards;
        }

        .description {
            color: var(--sub-text);
            font-size: 18px;
            max-width: 500px;
            margin: 0 auto 40px;
            opacity: 0;
            animation: slideUp 1s ease-out 0.7s forwards;
        }

        .button {
            display: inline-block;
            padding: 12px 30px;
            background-color: var(--accent-color);
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: 500;
            transition: all 0.3s ease;
            opacity: 0;
            animation: slideUp 1s ease-out 0.9s forwards;
        }

        .button:hover {
            background-color: #0077ed;
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(0, 113, 227, 0.3);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="code">404</h1>
        <h2 class="message">Oops! Trang không tồn tại.</h2>
        <p class="description">Có vẻ như đường dẫn bạn truy cập đã bị di chuyển hoặc không còn tồn tại. Hãy quay về trang chủ nhé.</p>
        <a href="/" class="button">Về Trang Chủ</a>
    </div>
</body>
</html>
